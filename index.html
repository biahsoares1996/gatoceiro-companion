<!DOCTYPE html>
<html>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width,initial-scale=1.0'>
    <title>Companion Scanner</title>
    <script src='https://unpkg.com/html5-qrcode'></script>
    <style>
        body{font-family:system-ui,sans-serif;background:#0f172a;color:white;text-align:center;margin:0;padding:20px;display:flex;flex-direction:column;align-items:center;height:100vh;justify-content:center;box-sizing:border-box}
        .container{width:100%;max-width:400px;background:#1e293b;border-radius:20px;padding:20px;border:1px solid #334155;box-shadow:0 25px 50px -12px rgba(0,0,0,0.5)}
        h1{color:#38bdf8;font-size:20px;margin-top:0}
        #reader{width:100%;border-radius:12px;overflow:hidden;margin-bottom:15px}
        .status-bar{background:#020617;padding:20px;border-radius:10px;font-weight:bold;color:#94a3b8;line-height:1.6;}
        .green{color:#10b981;background:#064e3b; border: 1px solid #10b981;}
        .yellow{color:#facc15}
    </style>
</head>
<body>
    <div class='container'>
        <h1>🐱 Gatoceiro Companion</h1>
        <div id='reader'></div>
        <div id='status' class='status-bar'>🔑 Iniciando Câmera...</div>
    </div>
    <script>
        const TOPIC='gatoceiro_companion_55424428';
        const statusDiv=document.getElementById('status');
        let sc;

        function startScanner(){
            document.getElementById('reader').style.display='block';
            statusDiv.innerText='🔍 Aponte para o QR Code';
            sc=new Html5QrcodeScanner('reader',{fps:15,qrbox:250,aspectRatio:1.0},false);
            sc.render(onScanSuccess);
        }

        function onScanSuccess(txt){
            // 1. Desliga o scanner instantaneamente
            sc.clear().then(()=>{
                document.getElementById('reader').style.display='none';
                statusDiv.className='status-bar yellow';
                statusDiv.innerText='📤 Transmitindo para o Computador...';
                
                // 2. Envia para a nuvem
                fetch('https://ntfy.sh/'+TOPIC,{method:'POST',body:txt})
                .then(()=>{
                    statusDiv.className='status-bar green';
                    statusDiv.innerHTML='🎉 NOTA FISCAL DETECTADA!<br><br>Vá para a tela do Computador agora.<br><br>Para ler outra depois, atualize esta página.';
                    if(navigator.vibrate) navigator.vibrate([200, 100, 200]);
                })
                .catch(e=>{
                    statusDiv.innerText='❌ Falha ao enviar. Verifique internet.';
                });
            });
        }

        window.onload = startScanner;
    </script>
</body>
</html>
